name = "easy-cloud"
main = "worker.js"
compatibility_date = "2024-01-01"

# KV namespace for storing file metadata
[[kv_namespaces]]
binding = "kv"
id = "YOUR_KV_NAMESPACE_ID"  # Replace with your actual KV namespace ID
preview_id = "YOUR_PREVIEW_KV_ID"  # Optional: for preview environment

# Environment variables (optional - can also set in worker.js)
[vars]
# TELEGRAM_BOT_TOKEN = "your_bot_token"
# TELEGRAM_CHANNEL_ID = "your_channel_id"

# Limits (adjust as needed)
[limits]
cpu_ms = 50  # CPU time limit per request